<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="burpee-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="burpee-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="20" y1="155" x2="180" y2="155" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 手臂（左） -->
  <path d="M 70 105 L 50 140" stroke="url(#burpee-accent)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="145" r="7" fill="#b91c1c"/>
  
  <!-- 手臂（右） -->
  <path d="M 130 105 L 150 140" stroke="url(#burpee-accent)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <circle cx="150" cy="145" r="7" fill="#b91c1c"/>
  
  <!-- 身体 -->
  <rect x="75" y="90" width="50" height="28" rx="14" fill="url(#burpee-body)"/>
  
  <!-- 腿部（准备跳跃） -->
  <path d="M 95 115 Q 90 130 85 145" stroke="url(#burpee-body)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <path d="M 105 115 Q 110 130 115 145" stroke="url(#burpee-body)" stroke-width="11" stroke-linecap="round" fill="none"/>
  
  <!-- 脚 -->
  <ellipse cx="85" cy="150" rx="7" ry="5" fill="#b91c1c"/>
  <ellipse cx="115" cy="150" rx="7" ry="5" fill="#b91c1c"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="80" r="17" fill="url(#burpee-body)"/>
  
  <!-- 面部 -->
  <circle cx="94" cy="77" r="2" fill="#fff"/>
  <circle cx="106" cy="77" r="2" fill="#fff"/>
  <path d="M 94 85 Q 100 87 106 85" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- 爆发力指示 -->
  <path d="M 100 60 L 95 50 L 100 52 L 105 42 L 102 52 L 110 45" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- 汗滴 -->
  <circle cx="90" cy="90" r="2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="110" cy="90" r="2" fill="#60a5fa" opacity="0.6"/>
  
  <!-- 运动轨迹 -->
  <path d="M 100 150 Q 100 130 100 110" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" fill="none" opacity="0.5">
    <animate attributeName="stroke-dashoffset" from="0" to="14" dur="0.6s" repeatCount="indefinite"/>
  </path>
</svg>