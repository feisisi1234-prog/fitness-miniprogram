<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 波比跳动作 -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  
  <!-- 人物 - 波比跳姿势（俯卧撑位置） -->
  <circle cx="75" cy="90" r="10" fill="#10b981"/>
  
  <!-- 身体 -->
  <path d="M 85 90 L 135 90" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 左臂 -->
  <path d="M 90 90 L 75 110" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 右臂 -->
  <path d="M 120 90 L 135 110" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 腿部 -->
  <path d="M 135 90 L 155 90" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 动作序列指示 -->
  <g opacity="0.5">
    <!-- 步骤1 -->
    <circle cx="50" cy="50" r="8" fill="#10b981"/>
    <path d="M 50 58 L 50 70" stroke="#10b981" stroke-width="6"/>
    <text x="45" y="45" font-size="12" fill="#fff" font-weight="bold">1</text>
    
    <!-- 步骤2 -->
    <circle cx="100" cy="50" r="8" fill="#059669"/>
    <text x="95" y="45" font-size="12" fill="#fff" font-weight="bold">2</text>
    
    <!-- 步骤3 -->
    <circle cx="150" cy="50" r="8" fill="#047857"/>
    <text x="145" y="45" font-size="12" fill="#fff" font-weight="bold">3</text>
  </g>
  
  <!-- 地面 -->
  <line x1="60" y1="115" x2="160" y2="115" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
