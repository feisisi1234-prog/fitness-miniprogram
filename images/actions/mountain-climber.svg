<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 登山跑动作 -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  
  <!-- 人物 - 登山跑姿势 -->
  <circle cx="80" cy="75" r="10" fill="#10b981"/>
  
  <!-- 身体 - 倾斜 -->
  <path d="M 90 75 L 125 85" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 左臂 - 支撑 -->
  <path d="M 95 75 L 80 100" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M 80 100 L 75 110" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 右臂 - 支撑 -->
  <path d="M 115 80 L 130 105" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  <path d="M 130 105 L 135 115" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
  
  <!-- 左腿 - 收起 -->
  <path d="M 125 85 Q 120 95 115 100" stroke="#059669" stroke-width="10" stroke-linecap="round"/>
  <circle cx="120" cy="92" r="3" fill="#ef4444"/>
  
  <!-- 右腿 - 伸展 -->
  <path d="M 125 85 L 145 95" stroke="#059669" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 运动箭头 -->
  <path d="M 115 105 Q 110 100 105 105" stroke="#fbbf24" stroke-width="2" fill="none"/>
  <path d="M 145 100 Q 150 95 155 100" stroke="#fbbf24" stroke-width="2" fill="none"/>
  
  <!-- 地面 -->
  <line x1="60" y1="120" x2="160" y2="120" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
