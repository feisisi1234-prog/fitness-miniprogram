<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="squat-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="squat-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="40" y1="170" x2="160" y2="170" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 腿部 -->
  <path d="M 80 120 Q 75 140 70 160" stroke="url(#squat-body)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 120 120 Q 125 140 130 160" stroke="url(#squat-body)" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- 脚 -->
  <ellipse cx="70" cy="165" rx="8" ry="5" fill="#059669"/>
  <ellipse cx="130" cy="165" rx="8" ry="5" fill="#059669"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="90" rx="28" ry="35" fill="url(#squat-body)"/>
  
  <!-- 手臂 -->
  <path d="M 75 85 Q 50 90 45 110" stroke="url(#squat-accent)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M 125 85 Q 150 90 155 110" stroke="url(#squat-accent)" stroke-width="10" stroke-linecap="round" fill="none"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="55" r="20" fill="url(#squat-body)"/>
  
  <!-- 面部细节 -->
  <circle cx="93" cy="52" r="2.5" fill="#fff"/>
  <circle cx="107" cy="52" r="2.5" fill="#fff"/>
  <path d="M 95 62 Q 100 65 105 62" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- 动作箭头 -->
  <path d="M 170 80 L 170 120" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 165 115 L 170 120 L 175 115" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 170 120 L 170 80" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
  <path d="M 165 85 L 170 80 L 175 85" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>
</svg>