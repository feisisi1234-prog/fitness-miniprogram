<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="jack-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jack-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="30" y1="175" x2="170" y2="175" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 腿部（张开） -->
  <path d="M 100 120 Q 70 140 55 165" stroke="url(#jack-body)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M 100 120 Q 130 140 145 165" stroke="url(#jack-body)" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- 脚 -->
  <ellipse cx="55" cy="170" rx="8" ry="5" fill="#d97706"/>
  <ellipse cx="145" cy="170" rx="8" ry="5" fill="#d97706"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="90" rx="26" ry="35" fill="url(#jack-body)"/>
  
  <!-- 手臂（张开向上） -->
  <path d="M 80 80 Q 50 60 40 40" stroke="url(#jack-accent)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <path d="M 120 80 Q 150 60 160 40" stroke="url(#jack-accent)" stroke-width="11" stroke-linecap="round" fill="none"/>
  
  <!-- 手 -->
  <circle cx="40" cy="37" r="6" fill="#d97706"/>
  <circle cx="160" cy="37" r="6" fill="#d97706"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="55" r="19" fill="url(#jack-body)"/>
  
  <!-- 面部 -->
  <circle cx="93" cy="52" r="2.5" fill="#fff"/>
  <circle cx="107" cy="52" r="2.5" fill="#fff"/>
  <path d="M 93 62 Q 100 66 107 62" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- 运动轨迹（手臂） -->
  <path d="M 45 45 Q 60 70 75 85" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  <path d="M 155 45 Q 140 70 125 85" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  
  <!-- 运动轨迹（腿） -->
  <path d="M 60 165 Q 80 145 95 125" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  <path d="M 140 165 Q 120 145 105 125" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  
  <!-- 能量星星 -->
  <path d="M 25 50 L 27 55 L 32 55 L 28 58 L 30 63 L 25 60 L 20 63 L 22 58 L 18 55 L 23 55 Z" fill="#fbbf24" opacity="0.8"/>
  <path d="M 175 50 L 177 55 L 182 55 L 178 58 L 180 63 L 175 60 L 170 63 L 172 58 L 168 55 L 173 55 Z" fill="#fbbf24" opacity="0.8"/>
</svg>