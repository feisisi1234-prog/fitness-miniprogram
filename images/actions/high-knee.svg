<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="knee-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="knee-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="40" y1="175" x2="160" y2="175" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 支撑腿 -->
  <path d="M 110 110 L 110 165" stroke="url(#knee-body)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <ellipse cx="110" cy="170" rx="9" ry="6" fill="#0891b2"/>
  
  <!-- 抬起的腿（高抬腿） -->
  <path d="M 90 110 Q 75 90 75 65" stroke="url(#knee-body)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M 75 65 Q 70 50 65 40" stroke="url(#knee-body)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <ellipse cx="65" cy="37" rx="6" ry="8" fill="#0891b2"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="85" rx="27" ry="32" fill="url(#knee-body)"/>
  
  <!-- 手臂（摆动） -->
  <path d="M 80 80 Q 60 70 50 55" stroke="url(#knee-accent)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="52" r="6" fill="#0891b2"/>
  
  <path d="M 120 90 Q 135 105 140 120" stroke="url(#knee-accent)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <circle cx="140" cy="123" r="6" fill="#0891b2"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="55" r="18" fill="url(#knee-body)"/>
  
  <!-- 面部 -->
  <circle cx="94" cy="52" r="2.5" fill="#fff"/>
  <circle cx="106" cy="52" r="2.5" fill="#fff"/>
  <path d="M 94 61 Q 100 64 106 61" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- 速度线 -->
  <path d="M 45 90 L 30 90" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 40 100 L 25 100" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 45 110 L 30 110" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  
  <!-- 运动轨迹 -->
  <path d="M 75 75 Q 70 85 70 95" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="5,3" fill="none" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="16" dur="0.8s" repeatCount="indefinite"/>
  </path>
  
  <!-- 心率图标 -->
  <path d="M 155 60 L 158 55 L 161 60 L 164 50 L 167 60 L 170 55" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>
</svg>