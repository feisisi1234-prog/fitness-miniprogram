<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="plank-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plank-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="20" y1="140" x2="180" y2="140" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 前臂（左） -->
  <rect x="45" y="115" width="25" height="12" rx="6" fill="url(#plank-accent)"/>
  <circle cx="45" cy="121" r="6" fill="#6d28d9"/>
  
  <!-- 前臂（右） -->
  <rect x="130" y="115" width="25" height="12" rx="6" fill="url(#plank-accent)"/>
  <circle cx="155" cy="121" r="6" fill="#6d28d9"/>
  
  <!-- 身体主干 -->
  <rect x="60" y="95" width="80" height="28" rx="14" fill="url(#plank-body)"/>
  
  <!-- 腿部 -->
  <rect x="130" y="105" width="45" height="14" rx="7" fill="url(#plank-body)"/>
  
  <!-- 脚 -->
  <ellipse cx="177" cy="112" rx="5" ry="9" fill="#6d28d9"/>
  
  <!-- 头部 -->
  <circle cx="55" cy="95" r="16" fill="url(#plank-body)"/>
  
  <!-- 面部 -->
  <circle cx="50" cy="92" r="2" fill="#fff"/>
  <circle cx="60" cy="92" r="2" fill="#fff"/>
  <path d="M 50 99 Q 55 101 60 99" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- 核心力量指示 -->
  <circle cx="100" cy="109" r="15" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="100" cy="109" r="10" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="2,2" opacity="0.8"/>
  
  <!-- 稳定性线条 -->
  <line x1="100" y1="80" x2="100" y2="70" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 95 72 L 100 70 L 105 72" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  
  <!-- 计时器图标 -->
  <circle cx="170" cy="90" r="12" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
  <path d="M 170 85 L 170 90 L 174 93" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>