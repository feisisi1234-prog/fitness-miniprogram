<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pushup-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pushup-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="20" y1="150" x2="180" y2="150" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 手臂（左） -->
  <path d="M 60 110 L 40 135" stroke="url(#pushup-accent)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="40" cy="140" r="8" fill="#1d4ed8"/>
  
  <!-- 手臂（右） -->
  <path d="M 140 110 L 160 135" stroke="url(#pushup-accent)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="160" cy="140" r="8" fill="#1d4ed8"/>
  
  <!-- 身体 -->
  <rect x="70" y="95" width="60" height="30" rx="15" fill="url(#pushup-body)"/>
  
  <!-- 腿部 -->
  <rect x="120" y="110" width="50" height="15" rx="7" fill="url(#pushup-body)"/>
  
  <!-- 脚 -->
  <ellipse cx="172" cy="117" rx="6" ry="10" fill="#1d4ed8"/>
  
  <!-- 头部 -->
  <circle cx="65" cy="95" r="18" fill="url(#pushup-body)"/>
  
  <!-- 面部细节 -->
  <circle cx="60" cy="92" r="2" fill="#fff"/>
  <circle cx="70" cy="92" r="2" fill="#fff"/>
  <path d="M 60 100 Q 65 102 70 100" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- 汗滴 -->
  <circle cx="55" cy="105" r="2" fill="#60a5fa" opacity="0.6"/>
  <circle cx="50" cy="115" r="2.5" fill="#60a5fa" opacity="0.6"/>
  
  <!-- 力量线条 -->
  <path d="M 35 125 L 25 120" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 30 130 L 20 130" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 165 125 L 175 120" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 170 130 L 180 130" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
</svg>