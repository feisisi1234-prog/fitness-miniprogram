<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 弓步动作 -->
  <circle cx="100" cy="100" r="95" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  
  <!-- 人物 - 弓步姿势 -->
  <circle cx="100" cy="55" r="12" fill="#10b981"/>
  
  <!-- 身体 -->
  <path d="M 100 67 L 100 100" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 左臂 -->
  <path d="M 100 75 L 80 90" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 右臂 -->
  <path d="M 100 75 L 120 90" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 前腿 - 弯曲 -->
  <path d="M 100 100 Q 110 120 110 140" stroke="#059669" stroke-width="10" stroke-linecap="round"/>
  <path d="M 110 140 L 115 155" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 后腿 - 伸直 -->
  <path d="M 100 100 L 75 130" stroke="#059669" stroke-width="10" stroke-linecap="round"/>
  <path d="M 75 130 L 70 145" stroke="#059669" stroke-width="8" stroke-linecap="round"/>
  
  <!-- 强调点 -->
  <circle cx="110" cy="125" r="3" fill="#ef4444"/>
</svg>
