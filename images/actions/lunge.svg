<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lunge-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lunge-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面 -->
  <line x1="30" y1="170" x2="170" y2="170" stroke="#e5e7eb" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 后腿 -->
  <path d="M 100 100 Q 120 130 130 155" stroke="url(#lunge-body)" stroke-width="11" stroke-linecap="round" fill="none"/>
  <ellipse cx="130" cy="160" rx="7" ry="5" fill="#be185d"/>
  
  <!-- 前腿 -->
  <path d="M 95 100 Q 80 130 70 160" stroke="url(#lunge-body)" stroke-width="13" stroke-linecap="round" fill="none"/>
  <ellipse cx="70" cy="165" rx="9" ry="6" fill="#be185d"/>
  
  <!-- 身体 -->
  <ellipse cx="100" cy="75" rx="25" ry="32" fill="url(#lunge-body)"/>
  
  <!-- 手臂（左） -->
  <path d="M 80 70 Q 60 75 55 95" stroke="url(#lunge-accent)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="55" cy="98" r="5" fill="#be185d"/>
  
  <!-- 手臂（右） -->
  <path d="M 120 70 Q 135 80 140 100" stroke="url(#lunge-accent)" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="140" cy="103" r="5" fill="#be185d"/>
  
  <!-- 头部 -->
  <circle cx="100" cy="45" r="18" fill="url(#lunge-body)"/>
  
  <!-- 面部 -->
  <circle cx="94" cy="42" r="2.5" fill="#fff"/>
  <circle cx="106" cy="42" r="2.5" fill="#fff"/>
  <path d="M 95 50 Q 100 53 105 50" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <!-- 平衡线 -->
  <line x1="100" y1="30" x2="100" y2="20" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="95" y1="25" x2="105" y2="25" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- 角度指示 -->
  <path d="M 70 145 A 20 20 0 0 1 85 130" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="75" y="140" font-size="12" fill="#f59e0b" font-weight="bold">90°</text>
</svg>